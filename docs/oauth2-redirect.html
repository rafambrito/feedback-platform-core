<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <title>OAuth2 Redirect</title>
</head>
<body>
<script>
"use strict";

function run() {
  var oauth2 = window.opener && window.opener.swaggerUIRedirectOauth2;
  if (!oauth2) {
    window.close();
    return;
  }

  var sentState = oauth2.state;
  var redirectUrl = oauth2.redirectUrl;
  var qp = /code|token|error/.test(window.location.hash)
    ? window.location.hash.substring(1).replace("?", "&")
    : window.location.search.substring(1);
  var arr = qp ? qp.split("&") : [];

  arr.forEach(function(v, i, a) {
    a[i] = '"' + v.replace("=", '":"') + '"';
  });

  var params = arr.length
    ? JSON.parse("{" + arr.join() + "}", function(key, value) {
        return key === "" ? value : decodeURIComponent(value);
      })
    : {};

  var isValid = params.state === sentState;
  var flow = oauth2.auth && oauth2.auth.schema && oauth2.auth.schema.get("flow");

  if ((flow === "accessCode" || flow === "authorizationCode" || flow === "authorization_code") && !oauth2.auth.code) {
    if (!isValid) {
      oauth2.errCb({
        authId: oauth2.auth.name,
        source: "auth",
        level: "warning",
        message: "Authorization may be unsafe, passed state was changed in server. Passed state wasn't returned from auth server"
      });
    }

    if (params.code) {
      delete oauth2.state;
      oauth2.auth.code = params.code;
      oauth2.callback({ auth: oauth2.auth, redirectUrl: redirectUrl });
    } else {
      var msg;
      if (params.error) {
        msg = "[" + params.error + "]: " +
          (params.error_description ? params.error_description + ". " : "no accessCode received from the server. ") +
          (params.error_uri ? "More info: " + params.error_uri : "");
      }

      oauth2.errCb({
        authId: oauth2.auth.name,
        source: "auth",
        level: "error",
        message: msg || "[Authorization failed]: no accessCode received from the server"
      });
    }
  } else {
    oauth2.callback({
      auth: oauth2.auth,
      token: params,
      isValid: isValid,
      redirectUrl: redirectUrl
    });
  }

  window.close();
}

if (document.readyState !== "loading") {
  run();
} else {
  document.addEventListener("DOMContentLoaded", run);
}
</script>
</body>
</html>
