openapi: 3.0.3
info:
  title: Feedback Platform API
  version: 1.0.0
  description: |
    API serverless do projeto feedback-platform-core exposta pelo Amazon API Gateway e protegida por Amazon Cognito.

    Boas praticas aplicadas neste contrato:
    - autenticacao centralizada no API Gateway com bearer JWT
    - schemas de request e response versionados no contrato
    - exemplos de payload para teste rapido
    - respostas de erro padronizadas para 4xx e 5xx
servers:
  - url: https://wg2n5b4tz7.execute-api.us-east-2.amazonaws.com/dev
    description: Ambiente dev publicado na AWS
tags:
  - name: Feedback
    description: Coleta e consulta de feedbacks
  - name: Notifications
    description: Processamento e consulta de notificacoes
  - name: Reports
    description: Consultas analiticas e relatorios
security:
  - CognitoOAuth2:
      - openid
paths:
  /feedback:
    post:
      tags:
        - Feedback
      summary: Registrar feedback
      description: Recebe um feedback academico e encaminha o processamento pela Lambda de coleta.
      operationId: createFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
            examples:
              default:
                value:
                  cursoId: 1TIA
                  alunoId: aluno-001
                  professorId: prof-123
                  nota: 9
                  comentario: Aula clara, com boa explicacao dos exercicios.
      responses:
        '201':
          description: Feedback recebido com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Feedback recebido com sucesso
        '400':
          $ref: '#/components/responses/BadRequestMessage'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerErrorMessage'
      x-amazon-apigateway-request-validator: body-only
  /feedback/{id}:
    get:
      tags:
        - Feedback
      summary: Consultar feedback por ID
      description: Recupera um feedback previamente armazenado pelo identificador informado.
      operationId: getFeedbackById
      parameters:
        - $ref: '#/components/parameters/FeedbackId'
      responses:
        '200':
          description: Feedback encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
              example:
                id: fb-1a2b3c
                cursoId: 1TIA
                alunoId: aluno-001
                professorId: prof-123
                nota: 9
                comentario: Aula clara, com boa explicacao dos exercicios.
                criticidade: BAIXA
                dataCriacao: '2026-07-12T13:15:10Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /notifications/urgent:
    post:
      tags:
        - Notifications
      summary: Enviar notificacao urgente
      description: Dispara o processamento de uma notificacao urgente a partir de um evento de criticidade.
      operationId: createUrgentNotification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UrgencyNotification'
            examples:
              default:
                value:
                  feedbackId: fb-1a2b3c
                  alunoId: aluno-001
                  professorId: prof-123
                  urgencia: CRITICA
      responses:
        '201':
          description: Notificacao criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
              example:
                id: ntf-1a2b3c
                feedbackId: fb-1a2b3c
                professorId: prof-123
                status: ENVIADA
                dataCriacao: '2026-07-12T13:20:10Z'
                dataEnvio: '2026-07-12T13:20:12Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /notifications/{id}:
    get:
      tags:
        - Notifications
      summary: Consultar notificacao por ID
      description: Retorna os detalhes da notificacao persistida.
      operationId: getNotificationById
      parameters:
        - $ref: '#/components/parameters/NotificationId'
      responses:
        '200':
          description: Notificacao encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Notificacao nao encontrada.
        '500':
          $ref: '#/components/responses/InternalServerError'
  /notifications/test/simulate:
    post:
      tags:
        - Notifications
      summary: Simular recebimento de notificacao
      description: Endpoint auxiliar para dev e homologacao que simula o consumo de uma mensagem pelo servico de notificacoes.
      operationId: simulateNotificationMessage
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
            example: '{"detail":{"feedbackId":"fb-1a2b3c","alunoId":"aluno-001","professorId":"prof-123","urgencia":"CRITICA"}}'
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Simulacao processada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Simulação processada com sucesso
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /reports/professor/{professorId}:
    get:
      tags:
        - Reports
      summary: Consultar relatorio por professor
      description: Retorna os feedbacks agregados para um professor.
      operationId: getProfessorReport
      parameters:
        - $ref: '#/components/parameters/ProfessorId'
      responses:
        '200':
          description: Relatorio retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessorReportResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /reports/curso/{cursoId}:
    get:
      tags:
        - Reports
      summary: Consultar relatorio por curso
      description: Retorna os feedbacks agregados para um curso.
      operationId: getCourseReport
      parameters:
        - $ref: '#/components/parameters/CursoId'
      responses:
        '200':
          description: Relatorio retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CursoReportResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /reports/weekly:
    get:
      tags:
        - Reports
      summary: Consultar relatorio semanal por curso
      description: Gera um consolidado semanal por curso, opcionalmente filtrando por professor.
      operationId: getWeeklyCourseReport
      parameters:
        - name: courseId
          in: query
          required: true
          description: Identificador do curso.
          schema:
            type: string
        - name: professorId
          in: query
          required: false
          description: Identificador do professor para filtragem opcional.
          schema:
            type: string
      responses:
        '200':
          description: Relatorio semanal retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyCourseReportResponse'
        '400':
          description: Parametros invalidos.
          content:
            text/plain:
              schema:
                type: string
              example: courseId é obrigatório
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    CognitoOAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://feedback-platform-dev-022267198187-us-east-2.auth.us-east-2.amazoncognito.com/oauth2/authorize
          tokenUrl: https://feedback-platform-dev-022267198187-us-east-2.auth.us-east-2.amazoncognito.com/oauth2/token
          scopes:
            openid: Escopo padrao para autenticacao via Cognito.
      description: |
        Fluxo OAuth2 Authorization Code via Amazon Cognito para uso do botao Authorize no Swagger UI.
  parameters:
    FeedbackId:
      name: id
      in: path
      required: true
      description: Identificador unico do feedback.
      schema:
        type: string
    NotificationId:
      name: id
      in: path
      required: true
      description: Identificador unico da notificacao.
      schema:
        type: string
    ProfessorId:
      name: professorId
      in: path
      required: true
      description: Identificador do professor.
      schema:
        type: string
    CursoId:
      name: cursoId
      in: path
      required: true
      description: Identificador do curso.
      schema:
        type: string
  responses:
    BadRequestMessage:
      description: Requisicao invalida.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: Payload de entrada é obrigatório
    BadRequestError:
      description: Requisicao invalida.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessageResponse'
          example:
            error: Payload inválido
    UnauthorizedError:
      description: Token ausente, invalido ou expirado.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthErrorResponse'
          example:
            error_code: TOKEN_INVALID
            message: Authorization Bearer token is required
            trace_id: 2d7ddf8d-9c23-4b3a-aa1f-3fe0e4d9b111
    ForbiddenError:
      description: Token valido sem permissao suficiente.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthErrorResponse'
          example:
            error_code: INSUFFICIENT_PERMISSION
            message: JWT must contain at least one role in 'groups' or 'scope'
            trace_id: 2d7ddf8d-9c23-4b3a-aa1f-3fe0e4d9b111
    NotFoundError:
      description: Recurso nao encontrado.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthErrorResponse'
          example:
            error_code: NOT_FOUND
            message: Feedback nao encontrado
            trace_id: 2d7ddf8d-9c23-4b3a-aa1f-3fe0e4d9b111
    InternalServerError:
      description: Erro interno no processamento.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessageResponse'
          example:
            error: Erro ao processar notificação
    InternalServerErrorMessage:
      description: Erro interno no processamento.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: Erro interno ao processar feedback
  schemas:
    FeedbackRequest:
      type: object
      required:
        - cursoId
        - alunoId
        - professorId
        - nota
        - comentario
      properties:
        cursoId:
          type: string
        alunoId:
          type: string
        professorId:
          type: string
        nota:
          type: integer
          minimum: 0
          maximum: 10
        comentario:
          type: string
      additionalProperties: false
    FeedbackResponse:
      type: object
      properties:
        id:
          type: string
        cursoId:
          type: string
        alunoId:
          type: string
        professorId:
          type: string
        nota:
          type: integer
        comentario:
          type: string
        criticidade:
          type: string
          enum:
            - BAIXA
            - MEDIA
            - ALTA
            - CRITICA
        dataCriacao:
          type: string
          format: date-time
    UrgencyNotification:
      type: object
      required:
        - feedbackId
        - alunoId
        - professorId
        - urgencia
      properties:
        feedbackId:
          type: string
        alunoId:
          type: string
        professorId:
          type: string
        urgencia:
          type: string
          enum:
            - BAIXA
            - MEDIA
            - ALTA
            - CRITICA
      additionalProperties: false
    NotificationResponse:
      type: object
      properties:
        id:
          type: string
        feedbackId:
          type: string
        professorId:
          type: string
        status:
          type: string
        dataCriacao:
          type: string
          format: date-time
        dataEnvio:
          type: string
          format: date-time
          nullable: true
    FeedbackReportItem:
      type: object
      properties:
        id:
          type: string
        cursoId:
          type: string
        alunoId:
          type: string
        professorId:
          type: string
        nota:
          type: integer
          nullable: true
        comentario:
          type: string
        criticidade:
          type: string
        dataCriacao:
          type: string
          format: date-time
    ProfessorReportResponse:
      type: object
      properties:
        professorId:
          type: string
        totalFeedbacks:
          type: integer
        feedbacks:
          type: array
          items:
            $ref: '#/components/schemas/FeedbackReportItem'
    CursoReportResponse:
      type: object
      properties:
        cursoId:
          type: string
        totalFeedbacks:
          type: integer
        feedbacks:
          type: array
          items:
            $ref: '#/components/schemas/FeedbackReportItem'
    WeeklyCourseReportResponse:
      type: object
      properties:
        courseId:
          type: string
        professorId:
          type: string
          nullable: true
        totalFeedbacks:
          type: integer
        averageNota:
          type: number
          format: double
        baixaCount:
          type: integer
          format: int64
        mediaCount:
          type: integer
          format: int64
        altaCount:
          type: integer
          format: int64
        feedbacksByProfessor:
          type: object
          additionalProperties:
            type: integer
            format: int64
        generatedAt:
          type: string
          format: date-time
    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    ErrorMessageResponse:
      type: object
      properties:
        error:
          type: string
    AuthErrorResponse:
      type: object
      properties:
        error_code:
          type: string
        message:
          type: string
        trace_id:
          type: string
x-amazon-apigateway-request-validators:
  body-only:
    validateRequestBody: true
    validateRequestParameters: false