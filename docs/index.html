<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Feedback Platform API</title>

<link rel="stylesheet"
href="https://unpkg.com/swagger-ui-dist/swagger-ui.css"/>

</head>

<body>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>

<script>

window.onload = () => {

const ui = SwaggerUIBundle({

url: "./openapi.yaml",

dom_id: "#swagger-ui",

deepLinking: true,

displayRequestDuration: true,

persistAuthorization: true

});

ui.initOAuth({

clientId: "349npdqa6ol9849tpf7fpdo3qb",

appName: "Feedback Platform",

usePkceWithAuthorizationCodeGrant: true

});

};

</script>

</body>

</html>
