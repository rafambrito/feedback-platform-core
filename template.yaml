AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: feedback-platform-core serverless API with Cognito authorizer

Parameters:
  StageName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
  DevOAuthScopes:
    Type: CommaDelimitedList
    Default: openid,email,profile
    Description: Escopos OAuth permitidos para dev
  DevAccessTokenValidityMinutes:
    Type: Number
    Default: 60
    MinValue: 5
    MaxValue: 1440
    Description: Validade do Access Token (minutos) em dev
  DevIdTokenValidityMinutes:
    Type: Number
    Default: 60
    MinValue: 5
    MaxValue: 1440
    Description: Validade do ID Token (minutos) em dev
  DevRefreshTokenValidityDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3650
    Description: Validade do Refresh Token (dias) em dev
  DefaultAdminUsername:
    Type: String
    Default: admin@admin.com
    Description: Usuario padrao criado no Cognito para testes manuais da API
  DefaultAdminEmail:
    Type: String
    Default: admin@admin.com
    Description: Email do usuario padrao criado no Cognito
  DefaultAdminPassword:
    Type: String
    NoEcho: true
    Default: Fiap2026Brito
    Description: Senha permanente do usuario padrao criado no Cognito
  SesFromEmail:
    Type: String
    Default: rafael.mendonca.brito@gmail.com
    Description: Email remetente usado pelo SES no notifier (deve ser identidade verificada no SES)
  SesToEmailOverride:
    Type: String
    Default: rafael.mendonca.brito@gmail.com
    Description: Opcional. Se preenchido, direciona todos os envios para este email (util para SES sandbox)
  WeeklyReportCourseId:
    Type: String
    Default: 1TIA
    Description: Identificador do curso usado pela Lambda agendada de relatorio semanal.
  WeeklyReportProfessorId:
    Type: String
    Default: ""
    Description: Opcional. Identificador do professor para filtrar o relatorio semanal agendado.
  ExistingNotificationQueueArn:
    Type: String
    Default: ""
    Description: Opcional. ARN de uma fila SQS existente para notificacoes. Se informado, a pilha nao cria nova fila.
  ExistingNotificationQueueUrl:
    Type: String
    Default: ""
    Description: Opcional. URL da fila SQS existente usada pelo collector para publicar mensagens.

Conditions:
  IsDev: !Equals [!Ref StageName, dev]
  UseExistingNotificationQueue: !Not [!Equals [!Ref ExistingNotificationQueueArn, ""]]
  CreateNotificationQueue: !Equals [!Ref ExistingNotificationQueueArn, ""]

Globals:
  Function:
    Runtime: java21
    MemorySize: 1024
    Timeout: 30
    Environment:
      Variables:
        SECURITY_INTERCEPTOR_ENABLED: "false"

Resources:
  ApiGatewayRestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub ${AWS::StackName}-api
      StageName: !Ref StageName
      Cors:
        AllowOrigin: "'https://rafambrito.github.io'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'https://rafambrito.github.io'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'https://rafambrito.github.io'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
      OpenApiVersion: 3.0.3
      MergeDefinitions: true
      DefinitionBody:
        openapi: 3.0.3
        info:
          title: Feedback Platform API
          version: 1.0.0
          description: |
            API serverless do projeto feedback-platform-core exposta pelo Amazon API Gateway e protegida por Amazon Cognito.

            Boas praticas aplicadas neste contrato:
            - autenticacao centralizada no API Gateway com bearer JWT
            - schemas de request e response versionados no contrato
            - exemplos de payload para teste rapido
            - respostas de erro padronizadas para 4xx e 5xx
        tags:
          - name: Feedback
            description: Coleta e consulta de feedbacks
          - name: Reports
            description: Consultas analiticas e relatorios
        security:
          - CognitoOAuth2:
              - openid
        paths:
          /feedback:
            post:
              tags:
                - Feedback
              summary: Registrar feedback
              description: Recebe um feedback academico e encaminha o processamento pela Lambda de coleta.
              operationId: createFeedback
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/FeedbackRequest'
                    examples:
                      default:
                        value:
                          cursoId: 1TIA
                          alunoId: aluno-001
                          professorId: prof-123
                          nota: 9
                          comentario: Aula clara, com boa explicacao dos exercicios.
              responses:
                '201':
                  description: Feedback recebido com sucesso.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/MessageResponse'
                      example:
                        message: Feedback recebido com sucesso
                '400':
                  $ref: '#/components/responses/BadRequestMessage'
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '500':
                  $ref: '#/components/responses/InternalServerErrorMessage'
              x-amazon-apigateway-request-validator: body-only
          /feedback/{id}:
            get:
              tags:
                - Feedback
              summary: Consultar feedback por ID
              description: Recupera um feedback previamente armazenado pelo identificador informado.
              operationId: getFeedbackById
              parameters:
                - $ref: '#/components/parameters/FeedbackId'
              responses:
                '200':
                  description: Feedback encontrado.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/FeedbackResponse'
                      example:
                        id: fb-1a2b3c
                        cursoId: 1TIA
                        alunoId: aluno-001
                        professorId: prof-123
                        nota: 9
                        comentario: Aula clara, com boa explicacao dos exercicios.
                        criticidade: BAIXA
                        dataCriacao: '2026-07-12T13:15:10Z'
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '404':
                  $ref: '#/components/responses/NotFoundError'
                '500':
                  $ref: '#/components/responses/InternalServerError'
          /reports/professor/{professorId}:
            get:
              tags:
                - Reports
              summary: Consultar relatorio por professor
              description: Retorna os feedbacks agregados para um professor.
              operationId: getProfessorReport
              parameters:
                - $ref: '#/components/parameters/ProfessorId'
              responses:
                '200':
                  description: Relatorio retornado com sucesso.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/ProfessorReportResponse'
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '500':
                  $ref: '#/components/responses/InternalServerError'
          /reports/curso/{cursoId}:
            get:
              tags:
                - Reports
              summary: Consultar relatorio por curso
              description: Retorna os feedbacks agregados para um curso.
              operationId: getCourseReport
              parameters:
                - $ref: '#/components/parameters/CursoId'
              responses:
                '200':
                  description: Relatorio retornado com sucesso.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/CursoReportResponse'
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '500':
                  $ref: '#/components/responses/InternalServerError'
          /reports/weekly:
            get:
              tags:
                - Reports
              summary: Consultar relatorio semanal por curso
              description: Gera um consolidado semanal por curso, opcionalmente filtrando por professor.
              operationId: getWeeklyCourseReport
              parameters:
                - name: courseId
                  in: query
                  required: true
                  description: Identificador do curso.
                  schema:
                    type: string
                - name: professorId
                  in: query
                  required: false
                  description: Identificador do professor para filtragem opcional.
                  schema:
                    type: string
              responses:
                '200':
                  description: Relatorio semanal retornado com sucesso.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/WeeklyCourseReportResponse'
                '400':
                  description: Parametros invalidos.
                  content:
                    text/plain:
                      schema:
                        type: string
                      example: courseId é obrigatório
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '500':
                  $ref: '#/components/responses/InternalServerError'
        components:
          securitySchemes:
            CognitoOAuth2:
              type: oauth2
              flows:
                authorizationCode:
                  authorizationUrl: !Sub https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/authorize
                  tokenUrl: !Sub https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/token
                  scopes:
                    openid: Escopo padrao para autenticacao via Cognito.
              description: |
                Fluxo OAuth2 Authorization Code via Amazon Cognito para uso do botao Authorize no Swagger UI.
          parameters:
            FeedbackId:
              name: id
              in: path
              required: true
              description: Identificador unico do feedback.
              schema:
                type: string
            ProfessorId:
              name: professorId
              in: path
              required: true
              description: Identificador do professor.
              schema:
                type: string
            CursoId:
              name: cursoId
              in: path
              required: true
              description: Identificador do curso.
              schema:
                type: string
          responses:
            BadRequestMessage:
              description: Requisicao invalida.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/MessageResponse'
                  example:
                    message: Payload de entrada é obrigatório
            UnauthorizedError:
              description: Token ausente, invalido ou expirado.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/AuthErrorResponse'
                  example:
                    error_code: TOKEN_INVALID
                    message: Authorization Bearer token is required
                    trace_id: 2d7ddf8d-9c23-4b3a-aa1f-3fe0e4d9b111
            ForbiddenError:
              description: Token valido sem permissao suficiente.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/AuthErrorResponse'
                  example:
                    error_code: INSUFFICIENT_PERMISSION
                    message: JWT must contain at least one role in 'groups' or 'scope'
                    trace_id: 2d7ddf8d-9c23-4b3a-aa1f-3fe0e4d9b111
            NotFoundError:
              description: Recurso nao encontrado.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/AuthErrorResponse'
                  example:
                    error_code: NOT_FOUND
                    message: Feedback nao encontrado
                    trace_id: 2d7ddf8d-9c23-4b3a-aa1f-3fe0e4d9b111
            InternalServerError:
              description: Erro interno no processamento.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorMessageResponse'
                  example:
                    error: Erro ao processar notificação
            InternalServerErrorMessage:
              description: Erro interno no processamento.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/MessageResponse'
                  example:
                    message: Erro interno ao processar feedback
          schemas:
            FeedbackRequest:
              type: object
              required:
                - cursoId
                - alunoId
                - professorId
                - nota
                - comentario
              properties:
                cursoId:
                  type: string
                alunoId:
                  type: string
                professorId:
                  type: string
                nota:
                  type: integer
                  minimum: 0
                  maximum: 10
                comentario:
                  type: string
              additionalProperties: false
            FeedbackResponse:
              type: object
              properties:
                id:
                  type: string
                cursoId:
                  type: string
                alunoId:
                  type: string
                professorId:
                  type: string
                nota:
                  type: integer
                comentario:
                  type: string
                criticidade:
                  type: string
                  enum:
                    - BAIXA
                    - MEDIA
                    - ALTA
                    - CRITICA
                dataCriacao:
                  type: string
                  format: date-time
            FeedbackReportItem:
              type: object
              properties:
                id:
                  type: string
                cursoId:
                  type: string
                alunoId:
                  type: string
                professorId:
                  type: string
                nota:
                  type: integer
                  nullable: true
                comentario:
                  type: string
                criticidade:
                  type: string
                dataCriacao:
                  type: string
                  format: date-time
            ProfessorReportResponse:
              type: object
              properties:
                professorId:
                  type: string
                totalFeedbacks:
                  type: integer
                feedbacks:
                  type: array
                  items:
                    $ref: '#/components/schemas/FeedbackReportItem'
            CursoReportResponse:
              type: object
              properties:
                cursoId:
                  type: string
                totalFeedbacks:
                  type: integer
                feedbacks:
                  type: array
                  items:
                    $ref: '#/components/schemas/FeedbackReportItem'
            WeeklyCourseReportResponse:
              type: object
              properties:
                courseId:
                  type: string
                professorId:
                  type: string
                  nullable: true
                totalFeedbacks:
                  type: integer
                averageNota:
                  type: number
                  format: double
                baixaCount:
                  type: integer
                  format: int64
                mediaCount:
                  type: integer
                  format: int64
                altaCount:
                  type: integer
                  format: int64
                feedbacksByProfessor:
                  type: object
                  additionalProperties:
                    type: integer
                    format: int64
                generatedAt:
                  type: string
                  format: date-time
            MessageResponse:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
            ErrorMessageResponse:
              type: object
              properties:
                error:
                  type: string
            AuthErrorResponse:
              type: object
              properties:
                error_code:
                  type: string
                message:
                  type: string
                trace_id:
                  type: string
        x-amazon-apigateway-request-validators:
          body-only:
            validateRequestBody: true
            validateRequestParameters: false
      Auth:
        DefaultAuthorizer: CognitoUserPoolAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoUserPoolAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-user-pool
      AliasAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: "OFF"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub ${AWS::StackName}-${AWS::AccountId}-${AWS::Region}
      UserPoolId: !Ref CognitoUserPool

  CognitoAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: ADMIN
      Description: Grupo administrativo padrao para testes da API
      UserPoolId: !Ref CognitoUserPool

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${AWS::StackName}-client
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      CallbackURLs:
        - https://rafambrito.github.io/oauth2-redirect.html
        - https://rafambrito.github.io/
        - https://rafambrito.github.io/feedback-platform-core/oauth2-redirect.html
        - https://rafambrito.github.io/feedback-platform-core/
        - https://localhost/callback
      LogoutURLs:
        - https://rafambrito.github.io/
        - https://rafambrito.github.io/feedback-platform-core/
        - https://localhost/signout
      AllowedOAuthScopes: !Ref DevOAuthScopes
      SupportedIdentityProviders:
        - COGNITO
      AccessTokenValidity: !Ref DevAccessTokenValidityMinutes
      IdTokenValidity: !Ref DevIdTokenValidityMinutes
      RefreshTokenValidity: !Ref DevRefreshTokenValidityDays
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  CognitoSeedUserRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: cognito-seed-user
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminUpdateUserAttributes
                Resource: !GetAtt CognitoUserPool.Arn

  CognitoSeedUserFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 60
      Role: !GetAtt CognitoSeedUserRole.Arn
      Code:
        ZipFile: |
          import json
          import urllib.request
          import boto3

          cognito = boto3.client("cognito-idp")

          def normalize_username(raw_username, email):
              # User pools configured with email alias reject usernames in email format.
              candidate = raw_username or ""
              if "@" in candidate:
                  source = email or candidate
                  candidate = source.replace("@", "_").replace(".", "_")
              return candidate

          def send(event, context, status, data, reason=None):
              body = {
                  "Status": status,
                  "Reason": reason or f"See details in CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": event.get("PhysicalResourceId") or f"{event['ResourceProperties']['UserPoolId']}:{event['ResourceProperties']['Username']}",
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data,
              }
              encoded = json.dumps(body).encode("utf-8")
              request = urllib.request.Request(
                  event["ResponseURL"],
                  data=encoded,
                  method="PUT",
                  headers={"content-type": "", "content-length": str(len(encoded))},
              )
              with urllib.request.urlopen(request) as response:
                  response.read()

          def ensure_user(props):
              user_pool_id = props["UserPoolId"]
              username = normalize_username(props.get("Username"), props.get("Email"))
              password = props["Password"]
              email = props["Email"]
              group_name = props["GroupName"]

              try:
                  cognito.admin_get_user(UserPoolId=user_pool_id, Username=username)
              except cognito.exceptions.UserNotFoundException:
                  cognito.admin_create_user(
                      UserPoolId=user_pool_id,
                      Username=username,
                      MessageAction="SUPPRESS",
                      UserAttributes=[
                          {"Name": "email", "Value": email},
                          {"Name": "email_verified", "Value": "true"},
                      ],
                  )

              cognito.admin_update_user_attributes(
                  UserPoolId=user_pool_id,
                  Username=username,
                  UserAttributes=[
                      {"Name": "email", "Value": email},
                      {"Name": "email_verified", "Value": "true"},
                  ],
              )
              cognito.admin_set_user_password(
                  UserPoolId=user_pool_id,
                  Username=username,
                  Password=password,
                  Permanent=True,
              )
              cognito.admin_add_user_to_group(
                  UserPoolId=user_pool_id,
                  Username=username,
                  GroupName=group_name,
              )

          def handler(event, context):
              try:
                  request_type = event["RequestType"]
                  props = event["ResourceProperties"]
                  effective_username = normalize_username(props.get("Username"), props.get("Email"))
                  if request_type in ("Create", "Update"):
                      ensure_user(props)
                      send(event, context, "SUCCESS", {"Username": effective_username})
                  else:
                      send(event, context, "SUCCESS", {"Username": effective_username})
              except Exception as exc:
                  send(event, context, "FAILED", {}, str(exc))

  CognitoSeedDefaultAdminUser:
    Type: Custom::CognitoSeedUser
    DependsOn:
      - CognitoAdminGroup
    Properties:
      ServiceToken: !GetAtt CognitoSeedUserFunction.Arn
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref DefaultAdminUsername
      Password: !Ref DefaultAdminPassword
      Email: !Ref DefaultAdminEmail
      GroupName: ADMIN

  # Publica o issuer esperado para o ambiente dev para os consumidores das APIs
  CognitoIssuerParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /feedback-platform/${AWS::StackName}/cognito/issuer
      Type: String
      Value: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
      Description: Issuer JWT esperado para validacao de tokens

  FeedbackTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  NotificationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  FeedbackNotificationQueue:
    Type: AWS::SQS::Queue
    Condition: CreateNotificationQueue
    Properties:
      QueueName: !Sub ${AWS::StackName}-feedback-notification-queue

  CollectorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: com.feedback.platform.lambda.CollectorLambdaHandler::handleRequest
      Environment:
        Variables:
          AWS_DYNAMODB_TABLE: !Ref FeedbackTable
          AWS_NOTIFICATION_QUEUE_URL: !If [CreateNotificationQueue, !Ref FeedbackNotificationQueue, !Ref ExistingNotificationQueueUrl]
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FeedbackTable
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !If [CreateNotificationQueue, !GetAtt FeedbackNotificationQueue.Arn, !Ref ExistingNotificationQueueArn]
      Events:
        CollectorPostFeedback:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGatewayRestApi
            Path: /feedback
            Method: post
            Auth:
              Authorizer: CognitoUserPoolAuthorizer
              AuthorizationScopes:
                - openid
        CollectorGetFeedback:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGatewayRestApi
            Path: /feedback/{id}
            Method: get
            Auth:
              Authorizer: CognitoUserPoolAuthorizer
              AuthorizationScopes:
                - openid

  NotifierFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: com.feedback.platform.notifier.lambda.NotifierLambdaHandler::handleRequest
      Environment:
        Variables:
          AWS_DYNAMODB_NOTIFICATION_TABLE: !Ref NotificationTable
          AWS_SES_FROM_EMAIL: !Ref SesFromEmail
          AWS_SES_TO_EMAIL_OVERRIDE: !Ref SesToEmailOverride
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationTable
        - Statement:
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
                - sqs:ChangeMessageVisibility
              Resource: !If [CreateNotificationQueue, !GetAtt FeedbackNotificationQueue.Arn, !Ref ExistingNotificationQueueArn]
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        NotificationQueueEvent:
          Type: SQS
          Properties:
            Queue: !If [CreateNotificationQueue, !GetAtt FeedbackNotificationQueue.Arn, !Ref ExistingNotificationQueueArn]
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

  ReporterFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: com.feedback.platform.reporter.lambda.ReporterLambdaHandler::handleRequest
      Environment:
        Variables:
          AWS_DYNAMODB_TABLE: !Ref FeedbackTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:DescribeTable
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt FeedbackTable.Arn
                - !Sub ${FeedbackTable.Arn}/index/*
      Events:
        ReporterGetProfessor:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGatewayRestApi
            Path: /reports/professor/{professorId}
            Method: get
            Auth:
              Authorizer: CognitoUserPoolAuthorizer
              AuthorizationScopes:
                - openid
        ReporterGetCurso:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGatewayRestApi
            Path: /reports/curso/{cursoId}
            Method: get
            Auth:
              Authorizer: CognitoUserPoolAuthorizer
              AuthorizationScopes:
                - openid
        ReporterGetWeekly:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGatewayRestApi
            Path: /reports/weekly
            Method: get
            Auth:
              Authorizer: CognitoUserPoolAuthorizer
              AuthorizationScopes:
                - openid

  WeeklyReportFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: com.feedback.platform.reporter.lambda.SemanalReportHandler::handleRequest
      Environment:
        Variables:
          AWS_DYNAMODB_TABLE: !Ref FeedbackTable
          AWS_WEEKLY_REPORT_COURSE_ID: !Ref WeeklyReportCourseId
          AWS_WEEKLY_REPORT_PROFESSOR_ID: !Ref WeeklyReportProfessorId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:DescribeTable
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt FeedbackTable.Arn
                - !Sub ${FeedbackTable.Arn}/index/*
      Events:
        WeeklyReportSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 8 ? * MON *)
            Name: !Sub ${AWS::StackName}-weekly-report-schedule
            Description: Dispara a geracao do relatorio semanal toda segunda-feira as 08:00 UTC.
            Enabled: true

Outputs:
  RestApiId:
    Value: !Ref ApiGatewayRestApi
  RestApiUrl:
    Value: !Sub https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
  CognitoUserPoolArn:
    Value: !GetAtt CognitoUserPool.Arn
  CognitoUserPoolClientId:
    Value: !Ref CognitoUserPoolClient
  CognitoHostedUIDomain:
    Value: !Sub https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com
  CognitoOAuthAuthorizationUrl:
    Value: !Sub https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/authorize
  CognitoOAuthTokenUrl:
    Value: !Sub https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/token
  CognitoDefaultAdminUsername:
    Value: !Ref DefaultAdminUsername
  CognitoJwtIssuerConfigured:
    Value: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
  CognitoJwtIssuerFromPool:
    Value: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
