AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: feedback-platform-core serverless API with Cognito authorizer
Parameters:
  StageName:
    Type: String
    Default: dev
    AllowedValues:
    - dev
    - hml
    - prd
  DevJwtIssuer:
    Type: String
    Default: https://cognito-idp.us-east-1.amazonaws.com/dev-user-pool-id
    Description: Issuer JWT esperado no ambiente dev
  HmlJwtIssuer:
    Type: String
    Default: https://cognito-idp.us-east-1.amazonaws.com/hml-user-pool-id
    Description: Issuer JWT esperado no ambiente hml
  PrdJwtIssuer:
    Type: String
    Default: https://cognito-idp.us-east-1.amazonaws.com/prd-user-pool-id
    Description: Issuer JWT esperado no ambiente prd
  DevOAuthScopes:
    Type: CommaDelimitedList
    Default: openid,email,profile
    Description: Escopos OAuth permitidos para dev
  HmlOAuthScopes:
    Type: CommaDelimitedList
    Default: openid,email,profile
    Description: Escopos OAuth permitidos para hml
  PrdOAuthScopes:
    Type: CommaDelimitedList
    Default: openid,email,profile
    Description: Escopos OAuth permitidos para prd
  DevAccessTokenValidityMinutes:
    Type: Number
    Default: 60
    MinValue: 5
    MaxValue: 1440
    Description: Validade do Access Token (minutos) em dev
  HmlAccessTokenValidityMinutes:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 1440
    Description: Validade do Access Token (minutos) em hml
  PrdAccessTokenValidityMinutes:
    Type: Number
    Default: 15
    MinValue: 5
    MaxValue: 1440
    Description: Validade do Access Token (minutos) em prd
  DevIdTokenValidityMinutes:
    Type: Number
    Default: 60
    MinValue: 5
    MaxValue: 1440
    Description: Validade do ID Token (minutos) em dev
  HmlIdTokenValidityMinutes:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 1440
    Description: Validade do ID Token (minutos) em hml
  PrdIdTokenValidityMinutes:
    Type: Number
    Default: 15
    MinValue: 5
    MaxValue: 1440
    Description: Validade do ID Token (minutos) em prd
  DevRefreshTokenValidityDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3650
    Description: Validade do Refresh Token (dias) em dev
  HmlRefreshTokenValidityDays:
    Type: Number
    Default: 15
    MinValue: 1
    MaxValue: 3650
    Description: Validade do Refresh Token (dias) em hml
  PrdRefreshTokenValidityDays:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 3650
    Description: Validade do Refresh Token (dias) em prd
Conditions:
  IsDev:
    Fn::Equals:
    - Ref: StageName
    - dev
  IsHml:
    Fn::Equals:
    - Ref: StageName
    - hml
Globals:
  Function:
    Runtime: java21
    MemorySize: 1024
    Timeout: 30
Resources:
  ApiGatewayRestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name:
        Fn::Sub: feedback-platform-api-${StageName}
      StageName:
        Ref: StageName
      OpenApiVersion: 3.0.3
      DefinitionBody:
        openapi: 3.0.3
        info:
          title: Feedback Platform API
          version: 1.0.0
          description: 'API serverless do projeto feedback-platform-core exposta pelo
            Amazon API Gateway e protegida por Amazon Cognito.


            Boas praticas aplicadas neste contrato:

            - autenticacao centralizada no API Gateway com bearer JWT

            - schemas de request e response versionados no contrato

            - exemplos de payload para teste rapido

            - respostas de erro padronizadas para 4xx e 5xx

            '
        servers:
        - url: https://xy1fzhv8o3.execute-api.us-east-2.amazonaws.com/dev
          description: Ambiente dev publicado na AWS
        tags:
        - name: Feedback
          description: Coleta e consulta de feedbacks
        - name: Notifications
          description: Processamento e consulta de notificacoes
        - name: Reports
          description: Consultas analiticas e relatorios
        security:
        - CognitoBearerAuth: []
        paths:
          /feedback:
            post:
              tags:
              - Feedback
              summary: Registrar feedback
              description: Recebe um feedback academico e encaminha o processamento
                pela Lambda de coleta.
              operationId: createFeedback
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/FeedbackRequest'
                    examples:
                      default:
                        value:
                          cursoId: 1TIA
                          alunoId: aluno-001
                          professorId: prof-123
                          nota: 9
                          comentario: Aula clara, com boa explicacao dos exercicios.
              responses:
                '201':
                  description: Feedback recebido com sucesso.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/MessageResponse'
                      example:
                        message: Feedback recebido com sucesso
                '400':
                  $ref: '#/components/responses/BadRequestMessage'
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '500':
                  $ref: '#/components/responses/InternalServerErrorMessage'
              x-amazon-apigateway-request-validator: body-only
          /feedback/{id}:
            get:
              tags:
              - Feedback
              summary: Consultar feedback por ID
              description: Recupera um feedback previamente armazenado pelo identificador
                informado.
              operationId: getFeedbackById
              parameters:
              - $ref: '#/components/parameters/FeedbackId'
              responses:
                '200':
                  description: Feedback encontrado.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/FeedbackResponse'
                      example:
                        id: fb-1a2b3c
                        cursoId: 1TIA
                        alunoId: aluno-001
                        professorId: prof-123
                        nota: 9
                        comentario: Aula clara, com boa explicacao dos exercicios.
                        criticidade: BAIXA
                        dataCriacao: '2026-07-12T13:15:10Z'
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '404':
                  $ref: '#/components/responses/NotFoundError'
                '500':
                  $ref: '#/components/responses/InternalServerError'
          /notifications/urgent:
            post:
              tags:
              - Notifications
              summary: Enviar notificacao urgente
              description: Dispara o processamento de uma notificacao urgente a partir
                de um evento de criticidade.
              operationId: createUrgentNotification
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/UrgencyNotification'
                    examples:
                      default:
                        value:
                          feedbackId: fb-1a2b3c
                          alunoId: aluno-001
                          professorId: prof-123
                          urgencia: CRITICA
              responses:
                '201':
                  description: Notificacao criada com sucesso.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/NotificationResponse'
                      example:
                        id: ntf-1a2b3c
                        feedbackId: fb-1a2b3c
                        professorId: prof-123
                        status: ENVIADA
                        dataCriacao: '2026-07-12T13:20:10Z'
                        dataEnvio: '2026-07-12T13:20:12Z'
                '400':
                  $ref: '#/components/responses/BadRequestError'
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '500':
                  $ref: '#/components/responses/InternalServerError'
          /notifications/{id}:
            get:
              tags:
              - Notifications
              summary: Consultar notificacao por ID
              description: Retorna os detalhes da notificacao persistida.
              operationId: getNotificationById
              parameters:
              - $ref: '#/components/parameters/NotificationId'
              responses:
                '200':
                  description: Notificacao encontrada.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/NotificationResponse'
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '404':
                  description: Notificacao nao encontrada.
                '500':
                  $ref: '#/components/responses/InternalServerError'
          /notifications/test/simulate:
            post:
              tags:
              - Notifications
              summary: Simular recebimento de notificacao
              description: Endpoint auxiliar para dev e homologacao que simula o consumo
                de uma mensagem pelo servico de notificacoes.
              operationId: simulateNotificationMessage
              requestBody:
                required: true
                content:
                  text/plain:
                    schema:
                      type: string
                    example: '{"detail":{"feedbackId":"fb-1a2b3c","alunoId":"aluno-001","professorId":"prof-123","urgencia":"CRITICA"}}'
                  application/json:
                    schema:
                      type: object
                      additionalProperties: true
              responses:
                '200':
                  description: Simulacao processada com sucesso.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/MessageResponse'
                      example:
                        message: "Simula\xE7\xE3o processada com sucesso"
                '400':
                  $ref: '#/components/responses/BadRequestError'
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
          /reports/professor/{professorId}:
            get:
              tags:
              - Reports
              summary: Consultar relatorio por professor
              description: Retorna os feedbacks agregados para um professor.
              operationId: getProfessorReport
              parameters:
              - $ref: '#/components/parameters/ProfessorId'
              responses:
                '200':
                  description: Relatorio retornado com sucesso.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/ProfessorReportResponse'
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '500':
                  $ref: '#/components/responses/InternalServerError'
          /reports/curso/{cursoId}:
            get:
              tags:
              - Reports
              summary: Consultar relatorio por curso
              description: Retorna os feedbacks agregados para um curso.
              operationId: getCourseReport
              parameters:
              - $ref: '#/components/parameters/CursoId'
              responses:
                '200':
                  description: Relatorio retornado com sucesso.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/CursoReportResponse'
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '500':
                  $ref: '#/components/responses/InternalServerError'
          /reports/weekly:
            get:
              tags:
              - Reports
              summary: Consultar relatorio semanal por curso
              description: Gera um consolidado semanal por curso, opcionalmente filtrando
                por professor.
              operationId: getWeeklyCourseReport
              parameters:
              - name: courseId
                in: query
                required: true
                description: Identificador do curso.
                schema:
                  type: string
              - name: professorId
                in: query
                required: false
                description: Identificador do professor para filtragem opcional.
                schema:
                  type: string
              responses:
                '200':
                  description: Relatorio semanal retornado com sucesso.
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/WeeklyCourseReportResponse'
                '400':
                  description: Parametros invalidos.
                  content:
                    text/plain:
                      schema:
                        type: string
                      example: "courseId \xE9 obrigat\xF3rio"
                '401':
                  $ref: '#/components/responses/UnauthorizedError'
                '403':
                  $ref: '#/components/responses/ForbiddenError'
                '500':
                  $ref: '#/components/responses/InternalServerError'
        components:
          securitySchemes:
            CognitoBearerAuth:
              type: http
              scheme: bearer
              bearerFormat: JWT
              description: 'Access token emitido pelo Amazon Cognito User Pool configurado
                no API Gateway.

                Envie o cabecalho Authorization no formato Bearer <token>.

                '
          parameters:
            FeedbackId:
              name: id
              in: path
              required: true
              description: Identificador unico do feedback.
              schema:
                type: string
            NotificationId:
              name: id
              in: path
              required: true
              description: Identificador unico da notificacao.
              schema:
                type: string
            ProfessorId:
              name: professorId
              in: path
              required: true
              description: Identificador do professor.
              schema:
                type: string
            CursoId:
              name: cursoId
              in: path
              required: true
              description: Identificador do curso.
              schema:
                type: string
          responses:
            BadRequestMessage:
              description: Requisicao invalida.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/MessageResponse'
                  example:
                    message: "Payload de entrada \xE9 obrigat\xF3rio"
            BadRequestError:
              description: Requisicao invalida.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorMessageResponse'
                  example:
                    error: "Payload inv\xE1lido"
            UnauthorizedError:
              description: Token ausente, invalido ou expirado.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/AuthErrorResponse'
                  example:
                    error_code: TOKEN_INVALID
                    message: Authorization Bearer token is required
                    trace_id: 2d7ddf8d-9c23-4b3a-aa1f-3fe0e4d9b111
            ForbiddenError:
              description: Token valido sem permissao suficiente.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/AuthErrorResponse'
                  example:
                    error_code: INSUFFICIENT_PERMISSION
                    message: JWT must contain at least one role in 'groups' or 'scope'
                    trace_id: 2d7ddf8d-9c23-4b3a-aa1f-3fe0e4d9b111
            NotFoundError:
              description: Recurso nao encontrado.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/AuthErrorResponse'
                  example:
                    error_code: NOT_FOUND
                    message: Feedback nao encontrado
                    trace_id: 2d7ddf8d-9c23-4b3a-aa1f-3fe0e4d9b111
            InternalServerError:
              description: Erro interno no processamento.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorMessageResponse'
                  example:
                    error: "Erro ao processar notifica\xE7\xE3o"
            InternalServerErrorMessage:
              description: Erro interno no processamento.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/MessageResponse'
                  example:
                    message: Erro interno ao processar feedback
          schemas:
            FeedbackRequest:
              type: object
              required:
              - cursoId
              - alunoId
              - professorId
              - nota
              - comentario
              properties:
                cursoId:
                  type: string
                alunoId:
                  type: string
                professorId:
                  type: string
                nota:
                  type: integer
                  minimum: 0
                  maximum: 10
                comentario:
                  type: string
              additionalProperties: false
            FeedbackResponse:
              type: object
              properties:
                id:
                  type: string
                cursoId:
                  type: string
                alunoId:
                  type: string
                professorId:
                  type: string
                nota:
                  type: integer
                comentario:
                  type: string
                criticidade:
                  type: string
                  enum:
                  - BAIXA
                  - MEDIA
                  - ALTA
                  - CRITICA
                dataCriacao:
                  type: string
                  format: date-time
            UrgencyNotification:
              type: object
              required:
              - feedbackId
              - alunoId
              - professorId
              - urgencia
              properties:
                feedbackId:
                  type: string
                alunoId:
                  type: string
                professorId:
                  type: string
                urgencia:
                  type: string
                  enum:
                  - BAIXA
                  - MEDIA
                  - ALTA
                  - CRITICA
              additionalProperties: false
            NotificationResponse:
              type: object
              properties:
                id:
                  type: string
                feedbackId:
                  type: string
                professorId:
                  type: string
                status:
                  type: string
                dataCriacao:
                  type: string
                  format: date-time
                dataEnvio:
                  type: string
                  format: date-time
                  nullable: true
            FeedbackReportItem:
              type: object
              properties:
                id:
                  type: string
                cursoId:
                  type: string
                alunoId:
                  type: string
                professorId:
                  type: string
                nota:
                  type: integer
                  nullable: true
                comentario:
                  type: string
                criticidade:
                  type: string
                dataCriacao:
                  type: string
                  format: date-time
            ProfessorReportResponse:
              type: object
              properties:
                professorId:
                  type: string
                totalFeedbacks:
                  type: integer
                feedbacks:
                  type: array
                  items:
                    $ref: '#/components/schemas/FeedbackReportItem'
            CursoReportResponse:
              type: object
              properties:
                cursoId:
                  type: string
                totalFeedbacks:
                  type: integer
                feedbacks:
                  type: array
                  items:
                    $ref: '#/components/schemas/FeedbackReportItem'
            WeeklyCourseReportResponse:
              type: object
              properties:
                courseId:
                  type: string
                professorId:
                  type: string
                  nullable: true
                totalFeedbacks:
                  type: integer
                averageNota:
                  type: number
                  format: double
                baixaCount:
                  type: integer
                  format: int64
                mediaCount:
                  type: integer
                  format: int64
                altaCount:
                  type: integer
                  format: int64
                feedbacksByProfessor:
                  type: object
                  additionalProperties:
                    type: integer
                    format: int64
                generatedAt:
                  type: string
                  format: date-time
            MessageResponse:
              type: object
              required:
              - message
              properties:
                message:
                  type: string
            ErrorMessageResponse:
              type: object
              properties:
                error:
                  type: string
            AuthErrorResponse:
              type: object
              properties:
                error_code:
                  type: string
                message:
                  type: string
                trace_id:
                  type: string
        x-amazon-apigateway-request-validators:
          body-only:
            validateRequestBody: true
            validateRequestParameters: false
      Auth:
        DefaultAuthorizer: CognitoUserPoolAuthorizer
        Authorizers:
          CognitoUserPoolAuthorizer:
            UserPoolArn:
              Fn::GetAtt:
              - CognitoUserPool
              - Arn
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName:
        Fn::Sub: feedback-platform-user-pool-${StageName}
      AliasAttributes:
      - email
      AutoVerifiedAttributes:
      - email
      MfaConfiguration: 'OFF'
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
  CognitoAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: ADMIN
      Description: Grupo administrativo padrao para testes da API
      UserPoolId:
        Ref: CognitoUserPool
  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName:
        Fn::Sub: feedback-platform-client-${StageName}
      UserPoolId:
        Ref: CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
      - ALLOW_USER_PASSWORD_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
      - ALLOW_USER_SRP_AUTH
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
      - code
      CallbackURLs:
      - https://localhost/callback
      LogoutURLs:
      - https://localhost/signout
      AllowedOAuthScopes:
        Fn::If:
        - IsDev
        - Ref: DevOAuthScopes
        - Fn::If:
          - IsHml
          - Ref: HmlOAuthScopes
          - Ref: PrdOAuthScopes
      SupportedIdentityProviders:
      - COGNITO
      AccessTokenValidity:
        Fn::If:
        - IsDev
        - Ref: DevAccessTokenValidityMinutes
        - Fn::If:
          - IsHml
          - Ref: HmlAccessTokenValidityMinutes
          - Ref: PrdAccessTokenValidityMinutes
      IdTokenValidity:
        Fn::If:
        - IsDev
        - Ref: DevIdTokenValidityMinutes
        - Fn::If:
          - IsHml
          - Ref: HmlIdTokenValidityMinutes
          - Ref: PrdIdTokenValidityMinutes
      RefreshTokenValidity:
        Fn::If:
        - IsDev
        - Ref: DevRefreshTokenValidityDays
        - Fn::If:
          - IsHml
          - Ref: HmlRefreshTokenValidityDays
          - Ref: PrdRefreshTokenValidityDays
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
  CognitoDefaultAdminUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId:
        Ref: CognitoUserPool
      Username: admin
      MessageAction: SUPPRESS
      DesiredDeliveryMediums: []
      UserAttributes:
      - Name: email
        Value: admin@feedback-platform.local
      - Name: email_verified
        Value: 'true'
  CognitoSeedUserRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: cognito-seed-user
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminAddUserToGroup
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminUpdateUserAttributes
            Resource:
              Fn::GetAtt:
              - CognitoUserPool
              - Arn
  CognitoSeedUserFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 60
      Role:
        Fn::GetAtt:
        - CognitoSeedUserRole
        - Arn
      Code:
        ZipFile: "import json\nimport urllib3\nimport boto3\n\nhttp = urllib3.PoolManager()\n\
          cognito = boto3.client(\"cognito-idp\")\n\ndef send(event, context, status,\
          \ data, reason=None):\n    body = {\n        \"Status\": status,\n     \
          \   \"Reason\": reason or f\"See details in CloudWatch Log Stream: {context.log_stream_name}\"\
          ,\n        \"PhysicalResourceId\": event.get(\"PhysicalResourceId\") or\
          \ f\"{event['ResourceProperties']['UserPoolId']}:{event['ResourceProperties']['Username']}\"\
          ,\n        \"StackId\": event[\"StackId\"],\n        \"RequestId\": event[\"\
          RequestId\"],\n        \"LogicalResourceId\": event[\"LogicalResourceId\"\
          ],\n        \"Data\": data,\n    }\n    encoded = json.dumps(body).encode(\"\
          utf-8\")\n    http.request(\"PUT\", event[\"ResponseURL\"], body=encoded,\
          \ headers={\"content-type\": \"\", \"content-length\": str(len(encoded))})\n\
          \ndef ensure_user(props):\n    user_pool_id = props[\"UserPoolId\"]\n  \
          \  username = props[\"Username\"]\n    password = props[\"Password\"]\n\
          \    email = props[\"Email\"]\n    group_name = props[\"GroupName\"]\n\n\
          \    try:\n        cognito.admin_get_user(UserPoolId=user_pool_id, Username=username)\n\
          \    except cognito.exceptions.UserNotFoundException:\n        cognito.admin_create_user(\n\
          \            UserPoolId=user_pool_id,\n            Username=username,\n\
          \            MessageAction=\"SUPPRESS\",\n            UserAttributes=[\n\
          \                {\"Name\": \"email\", \"Value\": email},\n            \
          \    {\"Name\": \"email_verified\", \"Value\": \"true\"},\n            ],\n\
          \        )\n\n    cognito.admin_update_user_attributes(\n        UserPoolId=user_pool_id,\n\
          \        Username=username,\n        UserAttributes=[\n            {\"Name\"\
          : \"email\", \"Value\": email},\n            {\"Name\": \"email_verified\"\
          , \"Value\": \"true\"},\n        ],\n    )\n    cognito.admin_set_user_password(\n\
          \        UserPoolId=user_pool_id,\n        Username=username,\n        Password=password,\n\
          \        Permanent=True,\n    )\n    cognito.admin_add_user_to_group(\n\
