quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.info-title=Feedback Collector API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.jackson.fail-on-unknown-properties=true

# Observability - Structured JSON logs and request correlation
quarkus.log.level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.additional-field.service_name.type=string
quarkus.log.console.json.additional-field.service_name.value=feedback-collector
quarkus.log.console.json.excluded-keys=processName,sequence

