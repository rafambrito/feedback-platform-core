quarkus.http.port=8081
quarkus.devservices.enabled=false

# OpenAPI/Swagger
quarkus.smallrye-openapi.info-title=Feedback Notifier Service
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.feedback.platform".level=DEBUG

# AWS Configuration
aws.region=us-east-1
aws.dynamodb.endpoint-override=
aws.dynamodb.notification-table=NotificacaoTable

# SQS Configuration
aws.sqs.region=us-east-1
aws.sqs.queue-name=feedback-critico-queue
aws.sqs.endpoint-override=
aws.sqs.dlq-url=https://sqs.us-east-1.amazonaws.com/000000000000/feedback-critico-dlq
aws.sqs.max-receive-count=3
aws.sqs.visibility-timeout-seconds=30
aws.sqs.wait-time-seconds=20

