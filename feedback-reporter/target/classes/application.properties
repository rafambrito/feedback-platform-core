quarkus.http.port=8082
quarkus.devservices.enabled=false

# Observability - Structured JSON logs and request correlation
quarkus.log.level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.additional-field.service_name.type=string
quarkus.log.console.json.additional-field.service_name.value=feedback-reporter
quarkus.log.console.json.excluded-keys=processName,sequence

aws.region=us-east-1
aws.dynamodb.table-name=FeedbackTable
aws.dynamodb.endpoint.override=http://localhost:4566
aws.dynamodb.gsi.curso-name=
aws.dynamodb.gsi.professor-name=

