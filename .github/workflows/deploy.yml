name: Deploy Pipeline
on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Remove rollback-complete stack if present
        run: |
          set -euo pipefail
          status=$(aws cloudformation describe-stacks \
            --stack-name feedback-platform \
            --region us-east-2 \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || true)

          if [ "$status" = "ROLLBACK_COMPLETE" ]; then
            aws cloudformation delete-stack \
              --stack-name feedback-platform \
              --region us-east-2
            aws cloudformation wait stack-delete-complete \
              --stack-name feedback-platform \
              --region us-east-2
          fi
      - name: Build SAM
        run: sam build
      - name: Deploy SAM
        run: |
          set +e
          sam deploy --no-confirm-changeset \
            --stack-name feedback-platform \
            --parameter-overrides StageName=dev DefaultAdminPassword=${{ secrets.COGNITO_DEFAULT_ADMIN_PASSWORD }} \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --region us-east-2
          rc=$?
          set -e

          if [ $rc -ne 0 ]; then
            echo "SAM deploy failed. Latest CREATE_FAILED events:"
            aws cloudformation describe-stack-events \
              --stack-name feedback-platform \
              --region us-east-2 \
              --query "StackEvents[?contains(ResourceStatus, 'FAILED')].[Timestamp,LogicalResourceId,ResourceType,ResourceStatusReason]" \
              --output table || true
            exit $rc
          fi

  publish-docs:
    needs: deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Sync Swagger OAuth config from deployed stack
        run: bash scripts/sync-swagger-oauth.sh feedback-platform us-east-2
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4